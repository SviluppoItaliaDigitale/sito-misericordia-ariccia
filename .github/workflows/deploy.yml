name: Pubblica su Aruba (LIVE)

# Pubblicazione LIVE del sito alla radice di www.misericordia-ariccia.it
# (decisione utente del 2026-07-06, dopo l'OK sull'anteprima):
#  - push su main: ad ogni modifica dei contenuti su GitHub il sito viene
#    ricompilato e pubblicato alla radice del dominio;
#  - cron giornaliero: rebuild notturno per aggiornare la Parola/Liturgia
#    del giorno, il santo del giorno, le letture e gli annunci scaduti;
#  - workflow_dispatch: avvio manuale on-demand.
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Ricostruzione giornaliera APPENA DOPO la mezzanotte italiana, così il
    # santo del giorno, le letture e gli annunci scaduti sono aggiornati fin
    # dai primi minuti del nuovo giorno. Il cron di GitHub è in UTC e l'ora
    # legale sposta l'offset dell'Italia: due pianificazioni si coprono a
    # vicenda tutto l'anno.
    #  - 22:05 UTC = 00:05 in ESTATE (ora legale, UTC+2); in inverno è solo
    #    una ricostruzione in più alle 23:05 del giorno prima (innocua).
    #  - 23:05 UTC = 00:05 in INVERNO (ora solare, UTC+1); in estate è una
    #    ricostruzione in più alle 01:05 (innocua).
    # Nota: GitHub può ritardare i cron di alcuni minuti nei momenti di
    # punta; il minuto 5 evita la congestione dell'ora esatta.
    - cron: "5 22 * * *"
    - cron: "5 23 * * *"

concurrency:
  group: deploy-aruba
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # storia completa: serve a Hugo (enableGitInfo) per mostrare
          # la data di ultimo aggiornamento reale di ogni pagina
          fetch-depth: 0

      - name: Installa Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.154.5"
          extended: true

      - name: Compila il sito
        run: hugo --minify

      - name: Pubblica via FTPS su Aruba
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # il certificato del server Aruba è intestato al nome macchina:
          # la verifica stretta del nome host fallirebbe
          security: loose
          local-dir: public/
          server-dir: www.misericordia-ariccia.it/
