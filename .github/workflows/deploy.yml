name: Pubblica su Aruba (anteprima)

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Ricostruzione giornaliera (04:00 UTC ≈ 05:00/06:00 in Italia):
    # gli annunci scaduti (data/annunci.yaml, campo "al") spariscono da soli.
    - cron: "0 4 * * *"

concurrency:
  group: deploy-aruba
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.154.5"
          extended: true

      - name: Compila il sito
        run: hugo --minify

      - name: Pubblica via FTPS su Aruba
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # il certificato del server Aruba è intestato al nome macchina:
          # la verifica stretta del nome host fallirebbe
          security: loose
          local-dir: public/
          server-dir: www.misericordia-ariccia.it/anteprima/
