name: Pubblica su Aruba (anteprima)

# ⚠️ Pubblicazione su Aruba DISATTIVATA (richiesta utente 2026-06-30):
# il sito NON deve essere pubblicato finché non si decide di lanciarlo.
# Niente deploy automatico su push né cron: resta solo l'avvio MANUALE
# (workflow_dispatch). Per riattivare il deploy automatico al lancio,
# ripristinare i trigger "push: branches: [main]" e/o "schedule".
on:
  workflow_dispatch:

concurrency:
  group: deploy-aruba
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.154.5"
          extended: true

      - name: Compila il sito
        run: hugo --minify

      - name: Pubblica via FTPS su Aruba
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # il certificato del server Aruba è intestato al nome macchina:
          # la verifica stretta del nome host fallirebbe
          security: loose
          local-dir: public/
          server-dir: www.misericordia-ariccia.it/anteprima/
