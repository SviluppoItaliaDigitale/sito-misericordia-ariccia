name: Pubblica su Aruba (LIVE)

# Pubblicazione LIVE del sito alla radice di www.misericordia-ariccia.it
# (decisione utente del 2026-07-06, dopo l'OK sull'anteprima):
#  - push su main: ad ogni modifica dei contenuti su GitHub il sito viene
#    ricompilato e pubblicato alla radice del dominio;
#  - cron giornaliero: rebuild notturno per aggiornare la Parola/Liturgia
#    del giorno, il santo del giorno, le letture e gli annunci scaduti;
#  - workflow_dispatch: avvio manuale on-demand.
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Ricostruzione giornaliera SUBITO DOPO la mezzanotte italiana
    # (00:30 UTC ≈ 01:30 inverno / 02:30 estate in Italia): così la
    # Liturgia/Parola del giorno e gli annunci scaduti sono già aggiornati
    # nelle prime ore del mattino.
    - cron: "30 0 * * *"

concurrency:
  group: deploy-aruba
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.154.5"
          extended: true

      - name: Compila il sito
        run: hugo --minify

      - name: Pubblica via FTPS su Aruba
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # il certificato del server Aruba è intestato al nome macchina:
          # la verifica stretta del nome host fallirebbe
          security: loose
          local-dir: public/
          server-dir: www.misericordia-ariccia.it/
