name: Anteprima animazioni (per la Governatrice)

# Pubblica una COPIA del sito in una sottocartella separata e temporanea,
# per far rivedere il nuovo look animato senza toccare /anteprima/.
# Quando la revisione è chiusa, si può eliminare questo workflow e la cartella.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Ricostruzione giornaliera (04:00 UTC ≈ 05:00/06:00 in Italia):
    # così gli annunci scaduti (data/annunci.yaml, campo "al") spariscono da soli,
    # senza bisogno di un push.
    - cron: "0 4 * * *"

concurrency:
  group: deploy-aruba
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.154.5"
          extended: true

      - name: Compila il sito
        run: hugo --minify

      - name: Pubblica via FTPS su Aruba (sottocartella anteprima-animazioni)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: public/
          server-dir: www.misericordia-ariccia.it/anteprima-animazioni/
