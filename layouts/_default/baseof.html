<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ site.Title }}</title>
  <meta name="description" content="{{ .Description | default site.Params.descrizione }}">
  <link rel="stylesheet" href="{{ "vendor/bootstrap/bootstrap.min.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/animazioni.css" | relURL }}">
  <link rel="icon" type="image/png" href="{{ "img/favicon.png" | relURL }}">
  <link rel="apple-touch-icon" href="{{ "img/favicon.png" | relURL }}">
  <script>
    /* Abilita le animazioni solo se il JS gira e l'utente non chiede moto ridotto.
       Rete di sicurezza: se l'orchestratore non parte entro 4s, mostra tutto. */
    (function () {
      var r = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (!r) {
        document.documentElement.className += " anim-pronto";
        setTimeout(function () {
          if (!window.__animOK) document.documentElement.classList.remove("anim-pronto");
        }, 4000);
      }
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#contenuto">Vai al contenuto</a>
  {{ partial "header.html" . }}
  <main id="contenuto">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}

  <!-- Torna su -->
  <button id="torna-su" type="button" aria-label="Torna all'inizio della pagina">↑</button>

  <!-- Lightbox per le immagini dei contenuti -->
  <div class="modal fade" id="lightbox" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content bg-transparent border-0 shadow-none">
        <div class="modal-body p-0 text-center">
          <img src="" alt="" class="img-fluid rounded">
          <p class="modal-didascalia text-white mt-2 mb-0"></p>
        </div>
        <button type="button" class="btn-close btn-close-white lightbox-chiudi" data-bs-dismiss="modal" aria-label="Chiudi"></button>
      </div>
    </div>
  </div>

  <script src="{{ "vendor/bootstrap/bootstrap.bundle.min.js" | relURL }}"></script>
  <script src="{{ "js/sito.js" | relURL }}"></script>

  <!-- Motore animazioni: GSAP + ScrollTrigger + SplitText + particelle (auto-ospitati) -->
  <script src="{{ "vendor/gsap/gsap.min.js" | relURL }}" defer></script>
  <script src="{{ "vendor/gsap/ScrollTrigger.min.js" | relURL }}" defer></script>
  <script src="{{ "vendor/gsap/SplitText.min.js" | relURL }}" defer></script>
  <script src="{{ "vendor/particles/particles.min.js" | relURL }}" defer></script>
  <script src="{{ "js/animazioni.js" | relURL }}" defer></script>
</body>
</html>
