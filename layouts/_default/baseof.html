<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ site.Title }}</title>
  <meta name="description" content="{{ .Description | default site.Params.descrizione }}">
  <link rel="stylesheet" href="{{ "vendor/bootstrap/bootstrap.min.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="icon" href="{{ "img/favicon.svg" | relURL }}" type="image/svg+xml">
</head>
<body>
  <a class="skip-link" href="#contenuto">Vai al contenuto</a>
  {{ partial "header.html" . }}
  <main id="contenuto">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="{{ "vendor/bootstrap/bootstrap.bundle.min.js" | relURL }}"></script>
</body>
</html>
