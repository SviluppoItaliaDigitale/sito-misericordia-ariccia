{{ define "main" }}
<div class="pagina-testata">
  <div class="container">
    <p class="occhiello mb-1" data-anim="fade-up">La Misericordia in immagini</p>
    <h1 data-split="words">{{ .Title }}</h1>
  </div>
</div>
<div class="pagina-corpo">
  <div class="container py-5">
    <nav aria-label="Percorso" class="mb-4" data-anim="fade-right">
      <ol class="breadcrumb briciole">
        <li class="breadcrumb-item"><a href="{{ "/" | relURL }}">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">{{ .Title }}</li>
      </ol>
    </nav>
    {{ with .Content }}<div class="contenuto mb-4" data-anim="fade-up">{{ . }}</div>{{ end }}
    {{ with .Params.foto }}
    <div class="galleria-griglia" data-anim-group>
      {{ range . }}
      <figure class="gal-item">
        <img src="{{ (printf "img/galleria/%s" .file) | relURL }}" alt="{{ .alt }}"
             width="{{ .w }}" height="{{ .h }}" loading="lazy">
      </figure>
      {{ end }}
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
